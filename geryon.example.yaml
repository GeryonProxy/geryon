# Geryon — Multi-Database Connection Pooler
# Three Bodies. One Proxy. Every Connection.

global:
  log_level: info           # debug | info | warn | error
  log_format: json          # json | text
  pid_file: /var/run/geryon.pid

  # Distributed tracing (OpenTelemetry)
  tracing:
    enabled: false
    exporter: otlpgrpc      # otlpgrpc | stdout
    endpoint: "localhost:4317"
    sampling_rate: 0.1      # 0.0 - 1.0

admin:
  rest:
    listen: "127.0.0.1:8080"
    read_timeout: "30s"
    write_timeout: "30s"
    auth:
      enabled: true
      token: "${GERYON_ADMIN_TOKEN}"
  grpc:
    listen: "127.0.0.1:9090"
    read_timeout: "30s"
    write_timeout: "30s"
  mcp:
    transport: sse           # stdio | sse
    listen: "127.0.0.1:8081"
    read_timeout: "30s"
  dashboard:
    enabled: true
    path: "/"               # Served on REST port

cluster:
  enabled: false
  node_id: "node-1"
  secret: "${GERYON_CLUSTER_SECRET}"  # Shared secret for inter-node HMAC auth
  tls:
    mode: disable            # disable | require | verify-ca | verify-full
    cert_file: ""
    key_file: ""
    ca_file: ""
  raft:
    listen: "0.0.0.0:7000"
    peers:
      - "node-2:7000"
      - "node-3:7000"
    election_timeout: "1s"
    heartbeat_interval: "150ms"
  gossip:
    listen: "0.0.0.0:7001"
    join:
      - "node-2:7001"
      - "node-3:7001"

auth:
  mode: interception         # passthrough | interception
  users:
    - username: "app"
      password_hash: "SCRAM-SHA-256$4096:salt:storedkey:serverkey"
      max_connections: 1000
      allowed_pools: ["*"]
    - username: "mssql_app"
      ntlm_password_hash: "8846f7eaee8fb117ad06bdd830b7586c"  # NT hash (hex) for MSSQL NTLMv2
      max_connections: 500
      allowed_pools: ["main-mssql"]

pools:
  - name: "main-pg"
    body: postgresql
    mode: transaction         # session | transaction | statement
    listen:
      host: "0.0.0.0"
      port: 5432
    backend:
      hosts:
        - host: "localhost"
          port: 5433
          role: primary
        - host: "localhost"
          port: 5434
          role: replica
      database: "myapp"
      auth:
        username: "postgres"
        password_file: "/etc/geryon/secrets/pg"
    limits:
      max_client_connections: 10000
      max_server_connections: 100
      min_server_connections: 5
      max_idle_time: "300s"
      connection_timeout: "5s"
      query_timeout: "30s"
    tls:
      mode: prefer            # disable | prefer | require | verify-ca | verify-full
    health:
      check_interval: "10s"
      check_query: "SELECT 1"
      max_failures: 3
    cache:
      enabled: true
      max_memory: "64MB"
      default_ttl: "5m"
      rules:
        - match: "SELECT.*FROM.*users.*WHERE"
          ttl: "1m"
        - match: "SELECT.*FROM.*sessions"
          never_cache: true
    prepared_statements:
      enabled: true
      max_size: 1000
      ttl: "10m"
    routing:
      read_write_split: true
      rules:
        - match: "report_.*"
          target: replica
          fallback: primary

  - name: "main-mysql"
    body: mysql
    mode: transaction
    listen:
      host: "0.0.0.0"
      port: 3306
    backend:
      hosts:
        - host: "localhost"
          port: 3307
          role: primary
      database: "myapp"
      auth:
        username: "root"
        password_file: "/etc/geryon/secrets/mysql"
    limits:
      max_client_connections: 5000
      max_server_connections: 50

  - name: "main-mssql"
    body: mssql
    mode: session
    listen:
      host: "0.0.0.0"
      port: 1433
    backend:
      hosts:
        - host: "localhost"
          port: 1434
          role: primary
      database: "myapp"
      auth:
        username: "sa"
        password_file: "/etc/geryon/secrets/mssql"
    limits:
      max_client_connections: 2000
      max_server_connections: 30
