name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=$VERSION"
          go build -ldflags "$LDFLAGS" -o "geryon-${{ matrix.suffix }}${{ matrix.ext }}" ./cmd/geryon

      - name: Create checksum
        run: |
          sha256sum "geryon-${{ matrix.suffix }}${{ matrix.ext }}" > "geryon-${{ matrix.suffix }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geryon-${{ matrix.suffix }}
          path: |
            geryon-${{ matrix.suffix }}${{ matrix.ext }}
            geryon-${{ matrix.suffix }}.sha256

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: geryon-*

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges $PREV_TAG..HEAD)
          fi

          # Create release notes
          cat > RELEASE_NOTES.md << EOF
          ## Geryon $VERSION

          ### Downloads

          | Platform | Architecture | Binary |
          |----------|--------------|--------|
          | Linux | amd64 | [geryon-linux-amd64](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-linux-amd64) |
          | Linux | arm64 | [geryon-linux-arm64](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-linux-arm64) |
          | macOS | amd64 | [geryon-darwin-amd64](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-darwin-amd64) |
          | macOS | arm64 | [geryon-darwin-arm64](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-darwin-arm64) |
          | Windows | amd64 | [geryon-windows-amd64.exe](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-windows-amd64.exe) |
          | FreeBSD | amd64 | [geryon-freebsd-amd64](https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-freebsd-amd64) |

          ### Changes

          $CHANGES

          ### Checksums

          \`\`\`
          $(cat artifacts/*/geryon-*.sha256 2>/dev/null || echo "See individual asset checksums")
          \`\`\`

          ### Installation

          #### Linux/macOS
          \`\`\`bash
          # Download and extract
curl -L -o geryon "https://github.com/${{ github.repository }}/releases/download/$VERSION/geryon-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)"
          chmod +x geryon
          sudo mv geryon /usr/local/bin/
          \`\`\`

          #### Windows
          Download the .exe file and add it to your PATH.

          #### Docker
          \`\`\`bash
          docker pull geryonproxy/geryon:$VERSION
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
