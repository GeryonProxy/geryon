{{- $root := . -}}
apiVersion: apps/v1
kind: {{ if .Values.cluster.enabled }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ include "geryon.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "geryon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.cluster.enabled }}
  serviceName: {{ include "geryon.fullname" . }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "geryon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "geryon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "geryon.serviceAccountName" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: geryon
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --config
            - /etc/geryon/config.yaml
          ports:
            - name: proxy
              containerPort: 5432
              protocol: TCP
            - name: rest
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: mcp
              containerPort: 8081
              protocol: TCP
            - name: dashboard
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/geryon
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/geryon
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: {{ include "geryon.fullname" . }}-config
              {{- if .Values.config.existingSecret }}
              - secret:
                  name: {{ .Values.config.existingSecret }}
              {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geryon.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "geryon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yaml: |
    global:
      log_level: {{ .Values.config.global.log_level | default "info" }}
      log_format: {{ .Values.config.global.log_format | default "json" }}
    {{- if .Values.config.cluster.enabled }}
    cluster:
      enabled: true
      raft:
        listen: {{ .Values.config.cluster.raft.listen }}
      gossip:
        listen: {{ .Values.config.cluster.gossip.listen }}
    {{- end }}
    limits:
      max_server_connections: {{ .Values.config.limits.max_server_connections | default 100 }}
      max_client_connections: {{ .Values.config.limits.max_client_connections | default 10000 }}
    pools:
    {{- range $name, $pool := .Values.pools }}
      {{ $name }}:
        mode: {{ $pool.mode }}
        body: {{ $pool.body }}
        port: {{ $pool.port }}
        backend:
          host: {{ $pool.backend.host }}
          port: {{ $pool.backend.port }}
          database: {{ $pool.backend.database }}
    {{- end }}
    auth:
      mode: {{ .Values.auth.mode | default "passthrough" }}
    admin:
      rest:
        listen: "{{ .Values.admin.rest.listen }}"
      grpc:
        listen: "{{ .Values.admin.grpc.listen }}"
      mcp:
        listen: "{{ .Values.admin.mcp.listen }}"
      dashboard:
        listen: "{{ .Values.admin.dashboard.listen }}"